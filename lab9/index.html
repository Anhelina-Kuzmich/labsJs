<!-- index.html -->
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Лабораторна №9: Форми з валідацією</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="register">Реєстрація</button>
            <button class="tab-btn" data-tab="login">Вхід</button>
        </div>

        <div id="register-tab" class="form-container active">
            <form id="registerForm" novalidate>
                <h2>Створення облікового запису</h2>
                
                <div class="form-group">
                    <label>Ім'я *</label>
                    <input type="text" id="regFirstName" placeholder="Введіть ім'я">
                    <div class="error-msg" id="firstNameError"></div>
                </div>

                <div class="form-group">
                    <label>Прізвище *</label>
                    <input type="text" id="regLastName" placeholder="Введіть прізвище">
                    <div class="error-msg" id="lastNameError"></div>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="regEmail" placeholder="example@domain.com">
                    <div class="error-msg" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label>Пароль *</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" placeholder="Мінімум 6 символів">
                        <i class="far fa-eye toggle-password" data-target="regPassword"></i>
                    </div>
                    <div class="error-msg" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label>Підтвердження пароля *</label>
                    <div class="password-wrapper">
                        <input type="password" id="regConfirmPassword" placeholder="Повторіть пароль">
                        <i class="far fa-eye toggle-password" data-target="regConfirmPassword"></i>
                    </div>
                    <div class="error-msg" id="confirmPasswordError"></div>
                </div>

                <div class="form-group">
                    <label>Телефон *</label>
                    <input type="tel" id="regPhone" placeholder="+380XXXXXXXXX">
                    <div class="error-msg" id="phoneError"></div>
                </div>

                <div class="form-group">
                    <label>Дата народження *</label>
                    <input type="date" id="regDob">
                    <div class="error-msg" id="dobError"></div>
                </div>

                <div class="form-group radio-group">
                    <label>Стать *</label>
                    <div class="radio-options">
                        <label><input type="radio" name="sex" value="male"> Чоловік</label>
                        <label><input type="radio" name="sex" value="female"> Жінка</label>
                    </div>
                    <div class="error-msg" id="sexError"></div>
                </div>

                <div class="form-group">
                    <label>Країна *</label>
                    <select id="regCountry">
                        <option value="" disabled selected>Оберіть країну</option>
                        <option value="ukraine">Україна</option>
                        <option value="usa">США</option>
                        <option value="germany">Німеччина</option>
                    </select>
                    <div class="error-msg" id="countryError"></div>
                </div>

                <div class="form-group">
                    <label>Місто *</label>
                    <select id="regCity" disabled>
                        <option value="" selected>Спочатку оберіть країну</option>
                    </select>
                    <div class="error-msg" id="cityError"></div>
                </div>

                <button type="submit" class="submit-btn">Зареєструватися</button>
                <div id="registerMessage" class="form-message"></div>
            </form>
        </div>

        <div id="login-tab" class="form-container">
            <form id="loginForm" novalidate>
                <h2>Вхід в акаунт</h2>

                <div class="form-group">
                    <label>Username (логін) *</label>
                    <input type="text" id="loginUsername" placeholder="Введіть логін">
                    <div class="error-msg" id="loginUsernameError"></div>
                </div>

                <div class="form-group">
                    <label>Пароль *</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="Мінімум 6 символів">
                        <i class="far fa-eye toggle-password" data-target="loginPassword"></i>
                    </div>
                    <div class="error-msg" id="loginPasswordError"></div>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="loginRemember"> Запам'ятати мене
                    </label>
                </div>

                <button type="submit" class="submit-btn">Увійти</button>
                <div id="loginMessage" class="form-message"></div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
