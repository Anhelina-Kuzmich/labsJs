<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4 taska</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Інтернет-магазин</h1>
    <section>
      <h2>Додати продукт</h2>
      <input id="product-name" placeholder="Назва" />
      <input id="product-price" type="number" placeholder="Ціна" />
      <input id="product-qtty" type="number" placeholder="Кількість" />
      <button id="add-product">Додати</button>
    </section>

    <section>
      <h2>Управління продуктом</h2>
      <input id="product-id" type="number" placeholder="ID продукту" />
      <input id="update-price" type="number" placeholder="Нова ціна" />
      <input id="update-qtty" type="number" placeholder="Нова кількість" />
      <button id="update-product">Оновити</button>
      <button id="delete-product">Видалити</button>
    </section>

    <section>
      <h2>Пошук продукту</h2>
      <input id="search-name" placeholder="Назва продукту" />
      <button id="search-product">Знайти</button>
    </section>

    <section>
      <h2>Створити замовлення</h2>
      <input id="order-id" placeholder="ID замовлення" />
      <input id="order-product-id" type="number" placeholder="ID продукту" />
      <input id="order-qty" type="number" placeholder="Кількість" />
      <button id="create-order">Замовити</button>
    </section>

    <section>
      <h2>Інформація</h2>
      <pre id="output"></pre>
    </section>

    <script src="script.js"></script>
  </body>
</html>
